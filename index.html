<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ARTEFAKT RULET · видеочат</title>
    <link rel="stylesheet" href="style.css" />
</head>
<body>
    <div class="container">
        <h1>✦ ARTEFAKT RULET ✦</h1>

        <!-- Оверлей разрешений -->
        <div class="permission-overlay" id="permissionOverlay">
            <div class="permission-card">
                <div class="permission-icon">🎙️</div>
                <h2>✦ АРТЕФАКТ АКТИВАЦИЯ ✦</h2>
                <p>Выбери режим подключения</p>
                
                <!-- КНОПКИ ВЫБОРА РЕЖИМА -->
                <div class="mode-selector">
                    <button class="mode-btn active" data-mode="video" id="modeVideo">
                        <span class="mode-icon">📹</span>
                        <span class="mode-label">С КАМЕРОЙ</span>
                    </button>
                    <button class="mode-btn" data-mode="audio" id="modeAudio">
                        <span class="mode-icon">🎧</span>
                        <span class="mode-label">БЕЗ КАМЕРЫ</span>
                    </button>
                </div>
                
                <button class="btn btn-primary" id="permissionBtn">
                    ▶ АКТИВИРОВАТЬ
                </button>
                <div class="permission-hint">
                    <span id="modeHint">⚠️ Браузер запросит доступ к камере и микрофону</span>
                </div>
            </div>
        </div>

        <!-- Статус подключения к серверу -->
        <div class="server-status" id="serverStatus">
            <span class="status-dot" id="serverDot"></span>
            <span id="serverText">Подключение к серверу...</span>
        </div>

        <div class="video-grid">
            <div class="video-box remote" id="remoteBox">
                <video id="remoteVideo" autoplay playsinline></video>
                <div class="placeholder" id="remotePlaceholder">⚡ ожидание</div>
                <div class="badge">СОБЕСЕДНИК</div>
            </div>

            <div class="video-box self" id="selfBox">
                <video id="selfVideo" autoplay playsinline muted></video>
                <div class="placeholder" id="selfPlaceholder">📷 камера</div>
                <div class="badge" id="selfBadge">ВЫ</div>
            </div>
        </div>

        <!-- ID собеседника -->
        <div class="partner-info" id="partnerInfo">
            <span class="label">СОБЕСЕДНИК:</span>
            <span class="id" id="partnerId">—</span>
        </div>

        <div class="status-bar" id="statusBar">
            <span class="dot" id="statusDot"></span>
            <span id="statusText">НАЖМИТЕ «НАЧАТЬ»</span>
        </div>

        <div class="actions">
            <button class="btn btn-primary" id="startBtn" disabled>▶ НАЧАТЬ</button>
            <button class="btn btn-danger" id="stopBtn" disabled>⏹ СТОП</button>
        </div>

        <!-- Счётчик онлайн -->
        <div class="online-counter" id="onlineCounter">
            👥 Онлайн: <span id="onlineCount">0</span>
        </div>

        <div class="footer">артефакт · соединение · случайность</div>
    </div>

    <!-- Подключаем PeerJS -->
    <script src="https://unpkg.com/peerjs@1.5.1/dist/peerjs.min.js"></script>
    <!-- Подключаем Socket.IO -->
    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
