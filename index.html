<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ARTEFAKT RULET · видеочат</title>
    <link rel="stylesheet" href="style.css" />
</head>
<body>
    <div class="container">
        <h1>✦ ARTEFAKT RULET ✦</h1>

        <!-- Оверлей для запроса разрешений -->
        <div class="permission-overlay" id="permissionOverlay">
            <div class="permission-card">
                <div class="permission-icon">🎙️</div>
                <h2>Разреши доступ</h2>
                <p>Для работы видеочата нужны камера и микрофон</p>
                <button class="btn btn-primary" id="permissionBtn">
                    ▶ РАЗРЕШИТЬ
                </button>
                <div class="permission-hint">
                    <span>⚠️ Браузер запросит доступ</span>
                </div>
            </div>
        </div>

        <div class="video-grid">
            <div class="video-box remote" id="remoteBox">
                <video id="remoteVideo" autoplay playsinline></video>
                <div class="placeholder" id="remotePlaceholder">⚡ ожидание</div>
                <div class="badge">СОБЕСЕДНИК</div>
            </div>

            <div class="video-box self" id="selfBox">
                <video id="selfVideo" autoplay playsinline muted></video>
                <div class="placeholder" id="selfPlaceholder">📷 камера</div>
                <div class="badge">ВЫ</div>
            </div>
        </div>

        <div class="status-bar" id="statusBar">
            <span class="dot" id="statusDot"></span>
            <span id="statusText">НАЖМИТЕ «НАЧАТЬ»</span>
        </div>

        <div class="actions">
            <button class="btn btn-primary" id="startBtn" disabled>▶ НАЧАТЬ</button>
            <button class="btn btn-danger" id="stopBtn" disabled>⏹ СТОП</button>
        </div>

        <div class="footer">артефакт · соединение · случайность</div>
    </div>

    <script src="script.js"></script>
</body>
</html>
