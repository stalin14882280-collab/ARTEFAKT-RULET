<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ARTEFAKT RULET · видеочат</title>
    <link rel="stylesheet" href="style.css" />
</head>
<body>
    <div class="container">
        <h1>✦ ARTEFAKT RULET ✦</h1>

        <div class="video-grid">
            <!-- собеседник (большое) -->
            <div class="video-box remote" id="remoteBox">
                <video id="remoteVideo" autoplay playsinline></video>
                <div class="placeholder" id="remotePlaceholder">⚡ ожидание</div>
                <div class="badge">СОБЕСЕДНИК</div>
            </div>

            <!-- своё видео (маленькое) -->
            <div class="video-box self" id="selfBox">
                <video id="selfVideo" autoplay playsinline muted></video>
                <div class="placeholder" id="selfPlaceholder">📷 камера</div>
                <div class="badge">ВЫ</div>
            </div>
        </div>

        <!-- статус -->
        <div class="status-bar" id="statusBar">
            <span class="dot" id="statusDot"></span>
            <span id="statusText">НАЖМИТЕ «НАЧАТЬ»</span>
        </div>

        <!-- кнопки -->
        <div class="actions">
            <button class="btn btn-primary" id="startBtn">▶ НАЧАТЬ</button>
            <button class="btn btn-danger" id="stopBtn" disabled>⏹ СТОП</button>
        </div>

        <div class="footer">артефакт · соединение · случайность</div>
    </div>

    <script src="script.js"></script>
</body>
</html>
